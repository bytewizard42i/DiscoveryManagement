name: Test Compile

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run test:compile
        working-directory: autodiscovery-contract
        run: npm run test:compile
